name: PR check

on:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build-check:
    name: Docker build check (no push)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (verify Dockerfile is valid)
        run: docker build -t devops-exercise-app:pr-check ./app

      - name: Image size
        run: docker images devops-exercise-app:pr-check